<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TravelOS - Hors-ligne</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col items-center justify-center p-4">
  <div class="text-center max-w-md bg-slate-900 p-8 rounded-2xl border border-slate-800 shadow-2xl">
    <div class="w-16 h-16 bg-amber-500/10 border border-amber-500/30 text-amber-500 rounded-2xl flex items-center justify-center mx-auto mb-6">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 1v22h22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
    </div>

    <h1 class="text-xl font-black tracking-tight mb-2">Connexion interrompue</h1>
    <p class="text-sm text-slate-400 leading-relaxed mb-6">
      Il semble que vous n'êtes pas connecté à Internet. L'application **TravelOS** nécessite une connexion active pour synchroniser vos données de suivi Hajj.
    </p>

    <button onclick="window.location.reload()" class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-500 font-bold text-sm rounded-xl transition-all active:scale-95">
      Réessayer la connexion
    </button>
  </div>
</body>
</html>
